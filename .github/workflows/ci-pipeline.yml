name: CI/CD Pipeline — Library Management System

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-sonar:
    name: Tests, Coverage & SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short \
            -v \
            --cov=src \
            --cov-report=html:coverage_html \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            --cov-fail-under=70

      - name: Upload JUnit XML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-junit
          path: junit.xml
          retention-days: 30

      - name: Upload Coverage XML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload HTML Coverage Report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: coverage_html/
          retention-days: 30

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: test-and-sonar

    steps:
      - name: Summary
        run: |
          echo "✅ All tests passed"
          echo "✅ Coverage > 70%"
          echo "✅ SonarCloud analysis complete"
          echo "Pipeline completed successfully"
