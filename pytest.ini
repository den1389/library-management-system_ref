[pytest]
testpaths = tests
addopts =
    --tb=short
    --strict-markers
    -v
    --cov=src
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --junitxml=junit.xml
    --cov-fail-under=70
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
